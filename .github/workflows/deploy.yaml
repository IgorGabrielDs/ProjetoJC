name: CI/CD Pipeline - Django para Azure

on:
  push:
    branches:
      - prod

jobs:
  # --- JOB 1: BUILD & TEST ---
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🧩 Checkout do código
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: ⚙️ Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🧪 Rodar testes (não bloqueante)
        run: pytest || echo "⚠️ Testes falharam, mas a pipeline continuará."

      - name: 📦 Preparar artefato para deploy
        run: zip -r release.zip . -x "venv/*" "__pycache__/*" ".git/*" "db.sqlite3*"

      - name: ⬆️ Upload do artefato
        uses: actions/upload-artifact@v4
        with:
          name: django-app
          path: release.zip

  # --- JOB 2: DEPLOY ---
  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: ⬇️ Download do artefato
        uses: actions/download-artifact@v4
        with:
          name: django-app

      - name: 📂 Extrair artefato
        run: unzip release.zip

      - name: 🔑 Login no Azure via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          # A LINHA INVÁLIDA FOI REMOVIDA DAQUI

      - name: 🚀 Deploy no Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          package: .

      - name: ✅ Health check (opcional)
        # Esta linha estava correta o tempo todo
        if: ${{ secrets.APP_HEALTHCHECK_URL != '' }}
        run: |
          echo "🔍 Verificando saúde do app em ${{ secrets.APP_HEALTHCHECK_URL }}"
          sleep 10
          curl -f "${{ secrets.APP_HEALTHCHECK_URL }}" || echo "⚠️ Health check falhou (app pode estar inicializando)"