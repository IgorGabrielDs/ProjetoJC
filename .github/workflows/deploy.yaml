name: CI/CD Django app to Azure Web App - JC

on:
  push:
    branches: [ main, prod ]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.10"
  DJANGO_SETTINGS_MODULE: "JornalDoCommercio.settings_dev"

# 👉 roda todos os "run:" dentro da subpasta do projeto
defaults:
  run:
    working-directory: ProjetoJC

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: jc_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: [ "5432:5432" ]
        options: >-
          --health-cmd="pg_isready -U postgres -d jc_test"
          --health-interval=10s --health-timeout=5s --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        # (checkout sempre na raiz; o defaults.run cuida do resto)

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            pg_isready -h localhost -p 5432 -U postgres -d jc_test && break
            echo "Postgres not ready yet..."; sleep 2
          done

      - name: Run tests (manage.py test)
        env:
          SECRET_KEY: "dummy-key-para-testes"
          GEMINI_API_KEY: "dummy-gemini-key-para-testes"
          DB_NAME: "jc_test"
          DB_USER: "postgres"
          DB_PASSWORD: "postgres"
          DB_HOST: "localhost"
          DB_PORT: "5432"
          DB_SSLMODE: "disable"
        run: python manage.py test -v 2

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions: { contents: read }

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Collect static
        env:
          DJANGO_SETTINGS_MODULE: "JornalDoCommercio.settings"
          SECRET_KEY: "dummy-key-collectstatic"
        run: python manage.py collectstatic --noinput

      - name: Zip artifact for deployment
        run: |
          zip -r ../release.zip . \
            -x "venv/" "_pycache_/" ".git/" ".github/" ".pytest_cache/" "db.sqlite3"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: django-app
          path: release.zip
        # ↑ path relativo à raiz do repositório

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: ${{ github.ref == 'refs/heads/prod' && 'Production' || 'Staging' }}
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: django-app

      - name: Unzip artifact
        run: unzip -o release.zip

      - name: Azure Login (Service Principal)
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}"
            }

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: ${{ github.ref == 'refs/heads/prod' && 'jornaldocommercio' || 'jornaldocommercio-staging' }}
          package: .