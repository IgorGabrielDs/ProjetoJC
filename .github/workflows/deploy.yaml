name: Django CI/CD to Azure

on:
  push:
    branches: [ main, prod ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Django tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: jc_db
          POSTGRES_USER: jc_user
          POSTGRES_PASSWORD: jc_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U jc_user -d jc_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-django

      - name: Set environment variables
        run: |
          echo "DJANGO_SETTINGS_MODULE=JornalDoCommercio.settings" >> $GITHUB_ENV
          echo "DATABASE_URL=postgres://jc_user:jc_pass@localhost:5432/jc_db" >> $GITHUB_ENV

      - name: Run Django checks
        run: python manage.py check

      - name: Run migrations
        run: python manage.py migrate

      - name: Run tests
        run: pytest -v
        continue-on-error: true 

  deploy:
    name: Deploy to Azure Web App
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/prod' 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Collect static files
        run: python manage.py collectstatic --noinput

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .