name: CI/CD - JC (Django → Azure Web App)

on:
  push:
    branches:
      - prod
  pull_request:
    branches:
      - prod
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"
  DJANGO_SETTINGS_MODULE: "JornalDoCommercio.settings_dev"

jobs:
  # --- JOB 1: TESTES (CI) ---
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-django

      - name: Verificar Django básico
        run: |
          python --version
          python -c "import django; print('Django', django.get_version())"

      - name: Rodar migrações (SQLite no CI)
        env:
          SECRET_KEY: "dummy-key-de-ci"
          GEMINI_API_KEY: "dummy-gemini"
        run: |
          python manage.py migrate --noinput

      - name: Coletar estáticos (testar pipeline estático)
        env:
          SECRET_KEY: "dummy-key-de-ci"
          GEMINI_API_KEY: "dummy-gemini"
        run: |
          python manage.py collectstatic --noinput

      - name: Rodar testes
        env:
          SECRET_KEY: "dummy-key-de-ci"
          GEMINI_API_KEY: "dummy-gemini"
        run: |
          pytest

  # --- JOB 2: BUILD (artefato para deploy) ---
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preparar pacote de deploy
        run: |
          mkdir -p build
          # Inclui tudo, exceto diretórios pesados/comuns
          zip -r build/app.zip . -x ".git" "_pycache_" ".venv" "venv/" ".mypy_cache/" ".pytest_cache/*"

      - name: Upload artefato
        uses: actions/upload-artifact@v4
        with:
          name: jc-build
          path: build/app.zip

  # --- JOB 3: DEPLOY (Azure Web App Linux com Publish Profile) ---
  deploy:
    if: github.ref == 'refs/heads/prod'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deploy.outputs.webapp-url }}
    steps:
      - name: Baixar artefato
        uses: actions/download-artifact@v4
        with:
          name: jc-build
          path: .

      - name: Deploy para Azure Web App
        id: deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          package: app.zip

      # (Opcional) Fazer warmup do site após deploy
      - name: Warmup
        run: |
          echo "Warmup em: https://${{ secrets.AZURE_WEBAPP_NAME }}.azurewebsites.net/" || true