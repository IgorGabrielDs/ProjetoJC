name: CI/CD Django App to Azure - jcproject

on:
  push:
    branches:
      - prod
  workflow_dispatch:

jobs:
  # --- JOB 1: TESTAR (CI) ---
  test:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: 🧩 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: ⚙️ Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true

      - name: 🧪 Run Django tests (non-blocking)
        env:
          SECRET_KEY: "dummy-key"
          DEBUG: "False"
          DATABASE_URL: "sqlite:///db.sqlite3"
        run: |
          python manage.py test || echo "⚠️ Testes falharam, mas pipeline continuará."

  # --- JOB 2: BUILD ---
  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 🧩 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: ⚙️ Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🏗️ Run Django collectstatic
        env:
          SECRET_KEY: "dummy-key"
          DEBUG: "False"
        run: |
          python manage.py collectstatic --noinput

      - name: 🗂️ Run Django migrations
        env:
          SECRET_KEY: "dummy-key"
          DEBUG: "False"
          DATABASE_URL: "sqlite:///db.sqlite3"
        run: |
          python manage.py migrate --noinput || echo "⚠️ Migrações falharam (ignorado para build)."

      - name: 📦 Zip artifact for deployment
        run: zip -r release.zip . -x "venv/*" "__pycache__/*" ".git/*" "db.sqlite3*"

      - name: ⬆️ Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: django-app
          path: release.zip

  # --- JOB 3: DEPLOY ---
  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: "Production"
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    permissions:
      id-token: write
      contents: read

    steps:
      - name: ⬇️ Download artifact
        uses: actions/download-artifact@v4
        with:
          name: django-app

      - name: 📂 Unzip artifact
        run: unzip release.zip

      - name: 🔑 Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: 🚀 Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'jcproject'
          package: .

      - name: ✅ Health check (opcional)
        if: ${{ env.APP_HEALTHCHECK_URL != '' }}
        env:
          APP_HEALTHCHECK_URL: ${{ secrets.APP_HEALTHCHECK_URL }}
        run: |
          echo "🔍 Verificando saúde do app em $APP_HEALTHCHECK_URL"
          curl -fsS --max-time 20 "$APP_HEALTHCHECK_URL" || echo "⚠️ Health check falhou (app pode estar inicializando)"
